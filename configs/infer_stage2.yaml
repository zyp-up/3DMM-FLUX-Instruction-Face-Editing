# =============================================================================
# Stage2 inference config, aligned with FLUX.2-klein defaults.
#
# Notes:
#   * Training-only fields stay out of this file.
#   * CLI only carries per-call values; use `--opts key=val` for overrides, e.g.
#     `--opts sampling.num_inference_steps=28 sampling.height=1024 sampling.width=1024`).
# =============================================================================

# ---- Frozen FLUX.2 backbone -------------------------------------------------
flux:
  model_path: ./models/FLUX.2-klein-4B
  torch_dtype: bf16                 # FLUX.2-klein inference dtype.

# ---- Sampling ---------------------------------------------------------------
# FLUX.2-klein-base is non-distilled, so transformer guidance must be None.
# This repo uses RCG instead of positive/negative-prompt CFG.
sampling:
  num_inference_steps: 28           # FLUX.2-klein default flow-matching steps.
  height: 1024                      # Lower to 512 when memory is limited.
  width: 1024
  seed: 42

  # ---- Reference Control Guidance (RCG) ----
  # FLUX.2 image editing encodes the reference image into ref_latents and feeds
  # cat(noisy_target_latents, ref_latents, CMM_tokens) at each DiT step.
  # RCG extrapolates between two CMM conditions:
  #   eps_ref = DiT(cat(latents, ref_latents, CMM(D_R, D_R)), text)
  #   eps_tgt = DiT(cat(latents, ref_latents, CMM(D_T, D_R)), text)
  #   eps     = eps_ref + lambda * (eps_tgt - eps_ref)
  rcg:
    enabled: true                   # false uses single-path CMM(D_T, D_R).
    lambda: 3.0                     # Extrapolation strength; sweep 0/1/3/5/7.

# ---- Trainable Stage1 / Stage2 heads ----------------------------------------
# Stage2 fine-tunes ConditionalDECAEncoder and CMM together. During inference,
# stage1.ckpt_path supplies structure config, while stage2.ckpt_path supplies
# the fine-tuned stage1_model and control_mixer weights.
stage1:
  ckpt_path: ./checkpoints/stage1/best-step-2400.pt
  # Match training: drop the internal Qwen3 and reuse pipe.text_encoder hidden states.
  drop_text_encoder: true

stage2:
  # best-step-xxx.pt contains {'stage1_model', 'control_mixer', 'cfg', 'step', ...}.
  # CLI --stage2_ckpt can override this path.
  ckpt_path: ./checkpoints/stage2/stage2-20260507-161431/best-step-1920.pt

# ---- Control module; must match training architecture ------------------------
model:
  control_mixer_hidden_dim: 512
  control_mixer_heads: 8
  control_joint_dim: 128
  control_dropout: 0.0

# ---- DECA rendering ---------------------------------------------------------
deca:
  data_dir: ./data
  test_size: 256                    # TestData crop size; does not set FLUX output size.

# ---- IO ---------------------------------------------------------------------
output:
  dir: ./output_stage2
  save_intermediates: true          # Save rendered/normal/albedo, 9ch controls, and tokens.
  save_summary_json: true
