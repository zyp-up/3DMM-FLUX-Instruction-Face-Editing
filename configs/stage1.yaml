# ===========================================================================
# Stage1 training config - supervised Conditional DECA Encoder pretraining
# ===========================================================================
#
# Usage:
#   torchrun --standalone --nproc_per_node=8 train_stage1.py \
#       --config configs/stage1.yaml
#
# Any field can be overridden from CLI:
#   --opts train.lr=5e-5 data.batch_size=16
# ===========================================================================

seed: 42                          # Global seed for numpy/torch/random.

# ---------------------------------------------------------------------------
# Data: multiple JSONL sources with independent roots.
# ---------------------------------------------------------------------------
data:
  sources:                        # JSONL sources merged during training.
    - jsonl: ./face_emoji/v1_pairs_with_instructions.jsonl                                 # One sample per line.
      src_root: ./face_emoji/final_data_v1_bucket_postprocessed                            # Root for image_*_path entries.
      params_root: ./face_emoji/deca_params/v1                                             # Root for target DECA .pt files.
    - jsonl: ./face_emoji/raf_pairs_with_instructions.jsonl
      src_root: ./face_emoji/final_data_raf_bucket_postprocessed
      params_root: ./face_emoji/deca_params/raf

  image_size: 224       # DECA ResNet50 crop size.
  crop_scale: 1.25      # FAN bbox expansion scale.
  pre_size: 256         # Pre-resize size aligned with extract_deca_params.py.
  prompt_key_en: instruction_en   # English prompt field; list values are sampled.
  prompt_key_cn: instruction_cn   # Chinese prompt field; list values are sampled.
  lang_prob_en: 0.5               # Probability of sampling an English prompt.
  use_fan: true                   # Use FAN face crop; false falls back to full-image bbox.

  num_workers: 8                  # DataLoader workers per rank.
  max_text_length: 64             # Tokenizer max length.
  pin_memory: true                # Speed up host-to-device copies.
  persistent_workers: true        # Reuse workers across epochs.

# ---------------------------------------------------------------------------
# Model: mirrors ConditionalDECAEncoder.__init__.
# ---------------------------------------------------------------------------
model:
  # Qwen3 text encoder weights; tokenizer files live in the sibling tokenizer dir.
  text_encoder_path: ./models/FLUX.2-klein-4B/text_encoder
  tokenizer_path: ./models/FLUX.2-klein-4B/tokenizer
  deca_model_tar: ./data/deca_model.tar   # Official DECA ResNet50 checkpoint.
  feature_dim: 2048                       # DECA ResNet50 feature dimension.
  text_hidden_size: 7680                  # FLUX.2 Klein prompt_embeds: Qwen3 layers 9/18/27.
  text_encoder_out_layers: [9, 18, 27]    # Matches FLUX.2 Klein encode_prompt defaults.
  num_attn_heads: 8                       # Cross-attention heads.
  reg_hidden: 1024                        # Regression-head hidden size.
  psi_dim: 50                             # DECA expression dimension.
  jaw_dim: 3                              # Jaw pose dimension, pose[3:6].
  freeze_backbone: false                  # Train the ResNet50 backbone.
  freeze_text_encoder: true               # Keep Qwen3 frozen to save memory.
  text_encoder_dtype: bf16                # Qwen3 inference dtype: bf16 / fp16 / fp32.

# ---------------------------------------------------------------------------
# Loss weights: mirrors Stage1LossWeights.
# ---------------------------------------------------------------------------
loss:
  lambda_psi: 1.0                 # Expression MSE weight.
  lambda_jaw: 10.0                # Jaw MSE weight.
  lambda_reg_psi: 1.0e-4          # Expression L2 regularization.
  lambda_reg_jaw_roll: 100.0      # Jaw-roll regularization.

# ---------------------------------------------------------------------------
# Training: optimizer, schedule, validation, and logging.
# ---------------------------------------------------------------------------
train:
  epochs: 10                      # Total epochs.
  batch_size: 32                  # Per-GPU batch size.
  val_ratio: 0.01                 # Validation split ratio.
  val_split_seed: 42              # Stable train/val split seed.

  lr: 1.0e-4                      # AdamW learning rate.
  weight_decay: 1.0e-2            # AdamW weight decay.
  betas: [0.9, 0.999]             # AdamW momentum coefficients.
  eps: 1.0e-8                     # AdamW epsilon.
  warmup_ratio: 0.05              # Linear warmup ratio.
  grad_clip: 1.0                  # Gradient clipping max norm.
  log_every: 1                    # Per-step log interval.
  val_every_steps: 20             # Validation interval in global steps; 0/null disables.
                                  # Best checkpoints are independent from periodic snapshots.
  val_every_epoch: null           # Extra validation interval in epochs; 0/null disables.
  use_amp: true                   # Enable AMP.
  amp_dtype: bf16                 # AMP dtype: bf16 / fp16 / fp32.

# ---------------------------------------------------------------------------
# Logging and checkpoints
# ---------------------------------------------------------------------------
logging:
  wandb_project: controlface-stage1   # wandb project.
  wandb_run_name: null                # null creates a timestamped run name.
  wandb_entity: zyp_up                # wandb entity.
  wandb_mode: online                  # online / offline / disabled
  wandb_api_key: null                 # Prefer WANDB_API_KEY; do not commit real keys.

ckpt:
  out_dir: ./checkpoints/stage1       # Root checkpoint directory.
  save_every_steps: null              # Periodic step-{N}.pt interval; 0/null disables.
                                      # Periodic snapshots do not affect best checkpoints.
  save_every_epoch: null              # Periodic epoch-{N}.pt interval; 0/null disables.
  save_total_limit: 3                 # Max periodic step checkpoints to keep.
  save_last: true                     # Also write last.pt for resume.
  save_best_only: true                # Keep a single best-step-{step}.pt.
  best_metric: val/total              # Metric used for best checkpoint selection.
  best_mode: min                      # min / max.
