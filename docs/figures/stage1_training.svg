<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="620" viewBox="0 0 1320 620">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2f5597"/>
    </marker>
    <style>
      .title{font:700 32px Arial,Helvetica,sans-serif;fill:#111827}
      .txt{font:600 18px Arial,Helvetica,sans-serif;fill:#111827}
      .small{font:500 14px Arial,Helvetica,sans-serif;fill:#374151}
      .box{fill:#f8fafc;stroke:#2f5597;stroke-width:2;rx:14}
      .orange{fill:#fce4d6;stroke:#c55a11;stroke-width:2;rx:14}
      .green{fill:#e2f0d9;stroke:#548235;stroke-width:2;rx:14}
      .blue{fill:#d9eaf7;stroke:#2f5597;stroke-width:2;rx:12}
      .pink{fill:#f4cccc;stroke:#a64d79;stroke-width:2;rx:12}
      .train{fill:#fee2e2;stroke:#dc2626;stroke-width:2;rx:14}
      .frozen{fill:#eef2ff;stroke:#64748b;stroke-width:2;stroke-dasharray:7 5;rx:14}
      .line{stroke:#2f5597;stroke-width:2.6;fill:none;marker-end:url(#arrow)}
      .loss{stroke:#dc2626;stroke-width:2.6;fill:none;marker-end:url(#arrow);stroke-dasharray:8 5}
    </style>
  </defs>

  <rect width="1320" height="620" fill="#ffffff"/>
  <text x="660" y="52" text-anchor="middle" class="title">Stage 1 Training: Text-Conditioned DECA Expression Prediction</text>

  <rect x="55" y="110" width="185" height="150" class="orange"/>
  <text x="147" y="145" text-anchor="middle" class="txt">Reference Image</text>
  <text x="147" y="170" text-anchor="middle" class="txt">X_R</text>
  <rect x="105" y="195" width="85" height="45" fill="#d9ead3" stroke="#6aa84f"/>
  <path d="M120 225 C133 210 162 210 176 225" fill="none" stroke="#38761d" stroke-width="5"/>

  <rect x="55" y="355" width="185" height="95" class="orange"/>
  <text x="147" y="393" text-anchor="middle" class="txt">Instruction</text>
  <text x="147" y="418" text-anchor="middle" class="small">make her burst into laughter</text>

  <rect x="330" y="105" width="185" height="150" class="orange"/>
  <text x="422" y="140" text-anchor="middle" class="txt">Target Image</text>
  <text x="422" y="165" text-anchor="middle" class="txt">X_T</text>
  <rect x="380" y="190" width="85" height="45" fill="#f9cb9c" stroke="#c55a11"/>
  <path d="M395 218 C410 235 435 235 450 218" fill="none" stroke="#cc0000" stroke-width="5"/>

  <rect x="330" y="355" width="210" height="90" class="green"/>
  <text x="435" y="390" text-anchor="middle" class="txt">FLUX.2 Text Encoder</text>
  <text x="435" y="418" text-anchor="middle" class="small">Qwen3 layers 9 / 18 / 27</text>

  <rect x="610" y="115" width="220" height="135" class="frozen"/>
  <text x="720" y="153" text-anchor="middle" class="txt">DECA Encoder</text>
  <text x="720" y="180" text-anchor="middle" class="small">target branch, frozen</text>
  <rect x="645" y="202" width="150" height="30" class="pink"/>
  <text x="720" y="223" text-anchor="middle" class="small">psi_t 50D, jaw_t 3D</text>

  <rect x="610" y="335" width="220" height="135" class="train"/>
  <text x="720" y="372" text-anchor="middle" class="txt">Conditional DECA</text>
  <text x="720" y="397" text-anchor="middle" class="txt">Encoder</text>
  <text x="720" y="424" text-anchor="middle" class="small">reference image + text</text>
  <rect x="645" y="442" width="150" height="30" class="blue"/>
  <text x="720" y="463" text-anchor="middle" class="small">psi_pred, jaw_pred</text>

  <rect x="910" y="145" width="270" height="280" class="box"/>
  <text x="1045" y="185" text-anchor="middle" class="txt">Supervision</text>
  <rect x="960" y="230" width="170" height="48" class="pink"/>
  <text x="1045" y="260" text-anchor="middle" class="small">DECA target params</text>
  <rect x="960" y="315" width="170" height="48" class="blue"/>
  <text x="1045" y="345" text-anchor="middle" class="small">predicted params</text>
  <text x="1045" y="395" text-anchor="middle" class="txt">MSE + regularization</text>

  <path d="M240 185 L610 395" class="line"/>
  <path d="M240 402 L330 402" class="line"/>
  <path d="M540 402 L610 402" class="line"/>
  <path d="M515 180 L610 180" class="line"/>
  <path d="M830 216 L960 254" class="loss"/>
  <path d="M830 456 L960 340" class="loss"/>

  <text x="660" y="535" text-anchor="middle" class="small">Only the Conditional DECA Encoder is optimized in Stage 1.</text>
  <text x="660" y="560" text-anchor="middle" class="small">It learns to map a reference identity and instruction to target expression coefficients and jaw pose.</text>
</svg>
