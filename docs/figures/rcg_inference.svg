<svg xmlns="http://www.w3.org/2000/svg" width="1420" height="720" viewBox="0 0 1420 720">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2f5597"/>
    </marker>
    <style>
      .title{font:700 34px Arial,Helvetica,sans-serif;fill:#111827}
      .sub{font:600 20px Arial,Helvetica,sans-serif;fill:#374151}
      .txt{font:600 17px Arial,Helvetica,sans-serif;fill:#111827}
      .small{font:500 14px Arial,Helvetica,sans-serif;fill:#374151}
      .box{fill:#f8fafc;stroke:#2f5597;stroke-width:2;rx:14}
      .green{fill:#e2f0d9;stroke:#548235;stroke-width:2;rx:14}
      .orange{fill:#fce4d6;stroke:#c55a11;stroke-width:2;rx:14}
      .blue{fill:#d9eaf7;stroke:#2f5597;stroke-width:2;rx:12}
      .pink{fill:#f4cccc;stroke:#a64d79;stroke-width:2;rx:12}
      .yellow{fill:#fff2cc;stroke:#bf9000;stroke-width:2;rx:14}
      .red{fill:#fee2e2;stroke:#dc2626;stroke-width:2;rx:14}
      .line{stroke:#2f5597;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
      .rline{stroke:#dc2626;stroke-width:2.6;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>

  <rect width="1420" height="720" fill="#ffffff"/>
  <text x="710" y="52" text-anchor="middle" class="title">Inference with Reference Control Guidance (RCG)</text>
  <text x="710" y="84" text-anchor="middle" class="sub">Use reference control as a baseline, then amplify the target-reference difference direction</text>

  <rect x="55" y="135" width="155" height="115" class="orange"/>
  <text x="132" y="170" text-anchor="middle" class="txt">Reference</text>
  <text x="132" y="194" text-anchor="middle" class="txt">Image X_R</text>
  <rect x="95" y="210" width="75" height="25" fill="#d9ead3" stroke="#6aa84f"/>

  <rect x="55" y="295" width="155" height="90" class="orange"/>
  <text x="132" y="335" text-anchor="middle" class="txt">Instruction P</text>
  <text x="132" y="360" text-anchor="middle" class="small">CN / EN prompt</text>

  <rect x="280" y="115" width="210" height="135" class="green"/>
  <text x="385" y="152" text-anchor="middle" class="txt">DECA Encoder</text>
  <text x="385" y="179" text-anchor="middle" class="small">reference 3DMM params</text>
  <text x="385" y="204" text-anchor="middle" class="small">identity / cam / light</text>

  <rect x="280" y="295" width="210" height="115" class="red"/>
  <text x="385" y="330" text-anchor="middle" class="txt">Conditional DECA</text>
  <text x="385" y="354" text-anchor="middle" class="txt">Encoder</text>
  <text x="385" y="382" text-anchor="middle" class="small">predict target exp / jaw</text>

  <rect x="560" y="170" width="220" height="150" class="yellow"/>
  <text x="670" y="210" text-anchor="middle" class="txt">Parameter Assembly</text>
  <text x="670" y="242" text-anchor="middle" class="small">keep identity / tex / cam / light</text>
  <text x="670" y="267" text-anchor="middle" class="small">replace expression + jaw only</text>
  <text x="670" y="292" text-anchor="middle" class="small">render D_R and D_T</text>

  <rect x="840" y="120" width="190" height="105" class="blue"/>
  <text x="935" y="155" text-anchor="middle" class="txt">Reference pass</text>
  <text x="935" y="182" text-anchor="middle" class="small">CMM(D_R, D_R)</text>
  <text x="935" y="207" text-anchor="middle" class="small">epsilon_ref</text>

  <rect x="840" y="295" width="190" height="105" class="pink"/>
  <text x="935" y="330" text-anchor="middle" class="txt">Target pass</text>
  <text x="935" y="357" text-anchor="middle" class="small">CMM(D_T, D_R)</text>
  <text x="935" y="382" text-anchor="middle" class="small">epsilon_tgt</text>

  <rect x="1095" y="190" width="250" height="130" class="red"/>
  <text x="1220" y="232" text-anchor="middle" class="txt">RCG Update</text>
  <text x="1220" y="264" text-anchor="middle" class="small">epsilon = epsilon_ref</text>
  <text x="1220" y="288" text-anchor="middle" class="small">+ lambda * (epsilon_tgt - epsilon_ref)</text>

  <rect x="1095" y="410" width="250" height="105" class="green"/>
  <text x="1220" y="447" text-anchor="middle" class="txt">FLUX.2 Denoising</text>
  <text x="1220" y="475" text-anchor="middle" class="small">VAE decode</text>
  <text x="1220" y="500" text-anchor="middle" class="small">final edited image</text>

  <path d="M210 190 L280 180" class="line"/>
  <path d="M210 340 L280 350" class="line"/>
  <path d="M490 182 L560 220" class="line"/>
  <path d="M490 352 L560 275" class="line"/>
  <path d="M780 225 L840 175" class="line"/>
  <path d="M780 275 L840 345" class="line"/>
  <path d="M1030 172 L1095 240" class="line"/>
  <path d="M1030 347 L1095 285" class="rline"/>
  <path d="M1220 320 L1220 410" class="line"/>

  <rect x="110" y="500" width="420" height="120" class="box"/>
  <text x="320" y="535" text-anchor="middle" class="txt">Inference Steps</text>
  <text x="132" y="565" class="small">1. Encode prompt P with FLUX.2 text encoder.</text>
  <text x="132" y="588" class="small">2. Encode X_R with DECA and predict target exp / jaw.</text>
  <text x="132" y="611" class="small">3. Render reference control D_R and target control D_T.</text>

  <rect x="575" y="500" width="420" height="120" class="box"/>
  <text x="785" y="535" text-anchor="middle" class="txt">RCG Design</text>
  <text x="597" y="565" class="small">D_R anchors identity and suppresses drift.</text>
  <text x="597" y="588" class="small">D_T - D_R provides the expression editing direction.</text>
  <text x="597" y="611" class="small">lambda controls expression strength.</text>
</svg>
