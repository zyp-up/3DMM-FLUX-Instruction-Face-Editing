<svg xmlns="http://www.w3.org/2000/svg" width="1950" height="1580" viewBox="0 0 1950 1580">
  <defs>
    <marker id="arrowBlue" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,7 L7,3.5 z" fill="#2f5597"/>
    </marker>
    <marker id="arrowRed" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,7 L7,3.5 z" fill="#c62828"/>
    </marker>
    <marker id="arrowGreen" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,7 L7,3.5 z" fill="#4f7f32"/>
    </marker>
    <marker id="arrowGray" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,7 L7,3.5 z" fill="#334155"/>
    </marker>
    <linearGradient id="gradInput" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffaf3"/>
      <stop offset="100%" stop-color="#ffead5"/>
    </linearGradient>
    <linearGradient id="gradFrozen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#e6f0ff"/>
    </linearGradient>
    <linearGradient id="gradRef" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#edf6ff"/>
      <stop offset="100%" stop-color="#cfe3ff"/>
    </linearGradient>
    <linearGradient id="gradTarget" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff0f0"/>
      <stop offset="100%" stop-color="#ffd6d6"/>
    </linearGradient>
    <linearGradient id="gradMix" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f2faee"/>
      <stop offset="100%" stop-color="#d9edcf"/>
    </linearGradient>
    <linearGradient id="gradRender" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff8da"/>
      <stop offset="100%" stop-color="#ffedab"/>
    </linearGradient>
    <linearGradient id="gradFormula" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef3f9"/>
    </linearGradient>
    <linearGradient id="gradOutput" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff7db"/>
      <stop offset="100%" stop-color="#ffe39b"/>
    </linearGradient>
    <filter id="softShadow" x="-6%" y="-8%" width="112%" height="118%">
      <feDropShadow dx="0" dy="3" stdDeviation="2.2" flood-color="#0f172a" flood-opacity="0.07"/>
    </filter>
    <style>
      .title{font:700 39px Arial,Helvetica,sans-serif;fill:#111827}
      .subtitle{font:600 20px Arial,Helvetica,sans-serif;fill:#475569}
      .section{font:700 24px Arial,Helvetica,sans-serif;fill:#111827}
      .label{font:700 20px Arial,Helvetica,sans-serif;fill:#111827}
      .text{font:600 16px Arial,Helvetica,sans-serif;fill:#111827}
      .bottomLabel{font:700 24px Arial,Helvetica,sans-serif;fill:#111827}
      .bottomText{font:600 19px Arial,Helvetica,sans-serif;fill:#111827}
      .bottomMath{font:700 22px Arial,Helvetica,sans-serif;fill:#111827}
      .loopText{font:700 20px Arial,Helvetica,sans-serif;fill:#111827}
      .small{font:500 14px Arial,Helvetica,sans-serif;fill:#475569}
      .tiny{font:500 12px Arial,Helvetica,sans-serif;fill:#64748b}
      .math{font:700 19px Arial,Helvetica,sans-serif;fill:#111827}
      .panel{fill:#ffffff;stroke:#d7dfec;stroke-width:2;rx:16}
      .input{fill:url(#gradInput);stroke:#ea7b25;stroke-width:2.8;rx:14;filter:url(#softShadow)}
      .frozen{fill:url(#gradFrozen);stroke:#6d8fbe;stroke-width:2.4;stroke-dasharray:8 6;rx:14}
      .ref{fill:url(#gradRef);stroke:#2f5597;stroke-width:2.6;rx:14;filter:url(#softShadow)}
      .target{fill:url(#gradTarget);stroke:#c62828;stroke-width:2.6;rx:14;filter:url(#softShadow)}
      .mix{fill:url(#gradMix);stroke:#4f7f32;stroke-width:2.8;rx:14;filter:url(#softShadow)}
      .render{fill:url(#gradRender);stroke:#c49a22;stroke-width:2.6;rx:14;filter:url(#softShadow)}
      .formula{fill:url(#gradFormula);stroke:#334155;stroke-width:2.2;rx:14;filter:url(#softShadow)}
      .output{fill:url(#gradOutput);stroke:#b7791f;stroke-width:3;rx:14;filter:url(#softShadow)}
      .flowBlue{fill:none;stroke:#2f5597;stroke-width:2.7;marker-end:url(#arrowBlue)}
      .flowRed{fill:none;stroke:#c62828;stroke-width:2.7;marker-end:url(#arrowRed)}
      .flowGreen{fill:none;stroke:#4f7f32;stroke-width:2.9;marker-end:url(#arrowGreen)}
      .flowGray{fill:none;stroke:#334155;stroke-width:2.5;marker-end:url(#arrowGray)}
      .dynBlue{fill:none;stroke:#2f5597;stroke-width:3.4;stroke-dasharray:12 8;marker-end:url(#arrowBlue);animation:dash 1.35s linear infinite}
      .dynRed{fill:none;stroke:#c62828;stroke-width:3.4;stroke-dasharray:12 8;marker-end:url(#arrowRed);animation:dash 1.35s linear infinite}
      .dynGreen{fill:none;stroke:#4f7f32;stroke-width:3.6;stroke-dasharray:12 8;marker-end:url(#arrowGreen);animation:dash 1.35s linear infinite}
      .pulse{animation:pulse 1.9s ease-in-out infinite}
      .blinkA{animation:fade 2.2s ease-in-out infinite}
      .blinkB{animation:fade 2.2s ease-in-out infinite;animation-delay:.75s}
      @keyframes dash{to{stroke-dashoffset:-36}}
      @keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
      @keyframes fade{0%,100%{opacity:.42}50%{opacity:1}}
    </style>
  </defs>

  <rect width="1950" height="1580" fill="#ffffff"/>
  <text x="975" y="58" text-anchor="middle" class="title">Dynamic Inference Pipeline with Reference Control Guidance</text>
  <text x="975" y="92" text-anchor="middle" class="subtitle">RCG anchors identity with reference control and extrapolates toward the target expression at every FLUX.2 sampling step.</text>

  <!-- Two clean vertical branches -->
  <rect x="95" y="140" width="740" height="735" class="panel"/>
  <text x="465" y="182" text-anchor="middle" class="section">Reference Identity Branch</text>

  <rect x="965" y="140" width="740" height="735" class="panel"/>
  <text x="1335" y="182" text-anchor="middle" class="section">Target Expression Branch</text>

  <!-- Left branch -->
  <rect x="250" y="220" width="430" height="92" class="input"/>
  <text x="465" y="257" text-anchor="middle" class="label">Reference Image</text>
  <text x="465" y="288" text-anchor="middle" class="math">X<tspan baseline-shift="sub" font-size="12">R</tspan></text>

  <rect x="250" y="382" width="430" height="100" class="frozen"/>
  <text x="465" y="420" text-anchor="middle" class="label">DECA Encoder</text>
  <text x="465" y="450" text-anchor="middle" class="small">extract full 3DMM parameters</text>

  <rect x="250" y="540" width="430" height="112" class="ref"/>
  <text x="465" y="579" text-anchor="middle" class="label">Reference Parameters</text>
  <text x="465" y="610" text-anchor="middle" class="math">shape, tex, exp, pose, cam, light</text>
  <text x="465" y="636" text-anchor="middle" class="small">identity-preserving parameter set</text>

  <rect x="250" y="728" width="430" height="96" class="render"/>
  <text x="465" y="765" text-anchor="middle" class="label">Render Reference Control</text>
  <text x="465" y="796" text-anchor="middle" class="math">D<tspan baseline-shift="sub" font-size="12">R</tspan> = rendered | normal | albedo</text>

  <!-- Right branch -->
  <rect x="1120" y="220" width="430" height="92" class="input"/>
  <text x="1335" y="257" text-anchor="middle" class="label">Instruction</text>
  <text x="1335" y="288" text-anchor="middle" class="math">P</text>

  <rect x="1120" y="382" width="430" height="100" class="frozen"/>
  <text x="1335" y="420" text-anchor="middle" class="label">FLUX Text Encoder</text>
  <text x="1335" y="450" text-anchor="middle" class="small">Qwen3 hidden states shared by Stage1 and DiT</text>

  <rect x="1120" y="540" width="430" height="112" class="target"/>
  <text x="1335" y="579" text-anchor="middle" class="label">Conditional DECA Encoder</text>
  <text x="1335" y="610" text-anchor="middle" class="math">predict ψ<tspan baseline-shift="sub" font-size="12">T</tspan> and jaw<tspan baseline-shift="sub" font-size="12">T</tspan></text>
  <text x="1335" y="636" text-anchor="middle" class="small">text-driven target expression geometry</text>

  <rect x="1120" y="728" width="430" height="96" class="render"/>
  <text x="1335" y="765" text-anchor="middle" class="label">Render Target Control</text>
  <text x="1335" y="796" text-anchor="middle" class="math">D<tspan baseline-shift="sub" font-size="12">T</tspan> = rendered | normal | albedo</text>

  <!-- Shared assembly note, placed between branches without crossing lines -->
  <rect x="740" y="548" width="320" height="96" class="formula"/>
  <text x="900" y="584" text-anchor="middle" class="label">Parameter Assembly</text>
  <text x="900" y="614" text-anchor="middle" class="small">keep identity, texture, camera, and lighting</text>
  <text x="900" y="636" text-anchor="middle" class="small">replace only expression and jaw pose</text>

  <!-- CMM -->
  <rect x="425" y="930" width="950" height="150" class="mix"/>
  <text x="900" y="976" text-anchor="middle" class="label">Control Mixer Module (CMM)</text>
  <text x="900" y="1012" text-anchor="middle" class="text">project 9-channel control maps into FLUX.2 control tokens aligned with the latent token grid</text>
  <rect x="515" y="1038" width="340" height="36" class="ref"/>
  <text x="685" y="1062" text-anchor="middle" class="text">reference pass: CMM(D<tspan baseline-shift="sub" font-size="10">R</tspan>, D<tspan baseline-shift="sub" font-size="10">R</tspan>)</text>
  <rect x="945" y="1038" width="340" height="36" class="target"/>
  <text x="1115" y="1062" text-anchor="middle" class="text">target pass: CMM(D<tspan baseline-shift="sub" font-size="10">T</tspan>, D<tspan baseline-shift="sub" font-size="10">R</tspan>)</text>

  <!-- RCG formula -->
  <rect x="555" y="1122" width="690" height="92" class="formula"/>
  <text x="900" y="1158" text-anchor="middle" class="label">RCG Update Rule</text>
  <text x="900" y="1194" text-anchor="middle" class="math">ε = ε<tspan baseline-shift="sub" font-size="12">ref</tspan> + λ · (ε<tspan baseline-shift="sub" font-size="12">tgt</tspan> - ε<tspan baseline-shift="sub" font-size="12">ref</tspan>)</text>

  <!-- Sampling input, FLUX, output -->
  <rect x="95" y="1292" width="330" height="132" class="formula"/>
  <text x="260" y="1332" text-anchor="middle" class="bottomLabel">Sampling Input</text>
  <text x="260" y="1370" text-anchor="middle" class="bottomText">noisy latent x<tspan baseline-shift="sub" font-size="11">t</tspan></text>
  <text x="260" y="1404" text-anchor="middle" class="bottomText">reference latent z<tspan baseline-shift="sub" font-size="11">R</tspan> = VAE(X<tspan baseline-shift="sub" font-size="11">R</tspan>)</text>

  <rect x="555" y="1268" width="690" height="178" class="green mix"/>
  <text x="900" y="1312" text-anchor="middle" class="bottomLabel">FLUX.2-klein DiT Sampling Step</text>
  <text x="900" y="1350" text-anchor="middle" class="bottomText">hidden states = [x<tspan baseline-shift="sub" font-size="11">t</tspan>, z<tspan baseline-shift="sub" font-size="11">R</tspan>, CMM tokens]</text>
  <text x="900" y="1380" text-anchor="middle" class="bottomText">text tokens = P, guidance = None</text>
  <rect x="615" y="1400" width="250" height="36" class="ref blinkA"/>
  <text x="740" y="1425" text-anchor="middle" class="bottomText">ε<tspan baseline-shift="sub" font-size="11">ref</tspan></text>
  <rect x="935" y="1400" width="250" height="36" class="target blinkB"/>
  <text x="1060" y="1425" text-anchor="middle" class="bottomText">ε<tspan baseline-shift="sub" font-size="11">tgt</tspan></text>

  <rect x="1390" y="1294" width="340" height="132" class="output"/>
  <text x="1560" y="1338" text-anchor="middle" class="bottomLabel">Edited Image</text>
  <text x="1560" y="1376" text-anchor="middle" class="bottomMath">X<tspan baseline-shift="sub" font-size="13">edit</tspan></text>
  <text x="1560" y="1410" text-anchor="middle" class="bottomText">final sample</text>

  <!-- Orthogonal flows: branch-local vertical lines -->
  <path d="M465 312 L465 382" class="dynBlue"/>
  <path d="M465 482 L465 540" class="dynBlue"/>
  <path d="M465 652 L465 728" class="dynBlue"/>
  <path d="M465 824 L465 892 L680 892 L680 930" class="dynBlue"/>

  <path d="M1335 312 L1335 382" class="dynRed"/>
  <path d="M1335 482 L1335 540" class="dynRed"/>
  <path d="M1335 652 L1335 728" class="dynRed"/>
  <path d="M1335 824 L1335 892 L1120 892 L1120 930" class="dynRed"/>

  <!-- Non-crossing short assembly connectors -->
  <path d="M680 596 L740 596" class="flowBlue"/>
  <path d="M1060 596 L1120 596" class="flowRed"/>

  <!-- CMM to FLUX, sampling to FLUX, FLUX to output -->
  <path d="M900 1080 L900 1122" class="dynGreen"/>
  <path d="M900 1214 L900 1268" class="dynGreen"/>
  <path d="M425 1358 L555 1358" class="flowGray"/>
  <path d="M1245 1358 L1390 1358" class="dynGreen"/>

  <!-- Internal RCG loop cue on FLUX block -->
  <path d="M760 1446 L760 1482 L1040 1482 L1040 1446" class="dynGreen"/>
  <text x="900" y="1532" text-anchor="middle" class="loopText">repeat for each timestep</text>

  <!-- Step badges -->
  <g class="pulse">
    <circle cx="465" cy="347" r="15" fill="#2f5597"/>
    <text x="465" y="352" text-anchor="middle" font-family="Arial" font-size="13" font-weight="700" fill="#fff">1</text>
    <circle cx="1335" cy="511" r="15" fill="#c62828"/>
    <text x="1335" y="516" text-anchor="middle" font-family="Arial" font-size="13" font-weight="700" fill="#fff">2</text>
    <circle cx="900" cy="892" r="15" fill="#4f7f32"/>
    <text x="900" y="897" text-anchor="middle" font-family="Arial" font-size="13" font-weight="700" fill="#fff">3</text>
    <circle cx="1318" cy="1332" r="15" fill="#4f7f32"/>
    <text x="1318" y="1337" text-anchor="middle" font-family="Arial" font-size="13" font-weight="700" fill="#fff">4</text>
  </g>

  <!-- Legend -->
  <rect x="95" y="1084" width="330" height="158" class="formula"/>
  <text x="260" y="1118" text-anchor="middle" class="text">Path Legend</text>
  <path d="M145 1152 L205 1152" class="flowBlue"/>
  <text x="306" y="1158" text-anchor="middle" class="small">reference path</text>
  <path d="M145 1190 L205 1190" class="flowRed"/>
  <text x="306" y="1196" text-anchor="middle" class="small">target path</text>
  <path d="M145 1228 L205 1228" class="flowGreen"/>
  <text x="306" y="1234" text-anchor="middle" class="small">RCG / sampling</text>
</svg>
