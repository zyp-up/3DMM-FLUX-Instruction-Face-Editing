<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="820" viewBox="0 0 1500 820">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2f5597"/>
    </marker>
    <style>
      .title{font:700 34px Arial,Helvetica,sans-serif;fill:#1f2937}
      .sub{font:600 20px Arial,Helvetica,sans-serif;fill:#374151}
      .txt{font:500 17px Arial,Helvetica,sans-serif;fill:#111827}
      .small{font:500 14px Arial,Helvetica,sans-serif;fill:#374151}
      .box{fill:#f8fafc;stroke:#2f5597;stroke-width:2.2;rx:14}
      .green{fill:#e2f0d9;stroke:#548235}
      .orange{fill:#fce4d6;stroke:#c55a11}
      .blue{fill:#d9eaf7;stroke:#2f5597}
      .yellow{fill:#fff2cc;stroke:#bf9000}
      .pink{fill:#f4cccc;stroke:#a64d79}
      .frozen{fill:#eef2ff;stroke:#64748b;stroke-dasharray:7 5}
      .train{fill:#fee2e2;stroke:#dc2626;stroke-width:2}
      .line{stroke:#2f5597;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
      .dline{stroke:#dc2626;stroke-width:2.5;fill:none;marker-end:url(#arrow);stroke-dasharray:8 5}
    </style>
  </defs>

  <rect width="1500" height="820" fill="#ffffff"/>
  <text x="750" y="54" text-anchor="middle" class="title">3DMM-FLUX Overall Architecture</text>
  <text x="750" y="86" text-anchor="middle" class="sub">DECA/3DMM parametric control + FLUX.2-klein flow-matching generation</text>

  <rect x="45" y="150" width="150" height="150" class="orange"/>
  <text x="120" y="180" text-anchor="middle" class="txt">Reference</text>
  <text x="120" y="204" text-anchor="middle" class="txt">Image X_R</text>
  <rect x="83" y="222" width="74" height="56" fill="#d9ead3" stroke="#6aa84f"/>
  <path d="M103 264 C112 236 132 236 142 264" fill="none" stroke="#38761d" stroke-width="5"/>

  <rect x="45" y="355" width="150" height="95" class="orange"/>
  <text x="120" y="392" text-anchor="middle" class="txt">Instruction</text>
  <text x="120" y="420" text-anchor="middle" class="small">CN / EN prompt</text>

  <rect x="270" y="135" width="210" height="185" class="frozen"/>
  <text x="375" y="170" text-anchor="middle" class="txt">DECA Encoder</text>
  <text x="375" y="196" text-anchor="middle" class="small">frozen identity branch</text>
  <rect x="300" y="220" width="150" height="30" class="blue"/>
  <text x="375" y="241" text-anchor="middle" class="small">shape beta 100D</text>
  <rect x="300" y="258" width="150" height="30" class="blue"/>
  <text x="375" y="279" text-anchor="middle" class="small">tex alpha 50D</text>
  <rect x="300" y="296" width="150" height="30" class="blue"/>
  <text x="375" y="317" text-anchor="middle" class="small">cam / light / pose</text>

  <rect x="270" y="372" width="210" height="150" class="train"/>
  <text x="375" y="408" text-anchor="middle" class="txt">Conditional</text>
  <text x="375" y="432" text-anchor="middle" class="txt">DECA Encoder</text>
  <text x="375" y="461" text-anchor="middle" class="small">reference image + text</text>
  <rect x="305" y="482" width="140" height="30" class="pink"/>
  <text x="375" y="503" text-anchor="middle" class="small">target exp / jaw</text>

  <rect x="560" y="145" width="210" height="120" class="green"/>
  <text x="665" y="184" text-anchor="middle" class="txt">FLAME</text>
  <text x="665" y="211" text-anchor="middle" class="small">3D face mesh</text>
  <text x="665" y="236" text-anchor="middle" class="small">identity-preserved params</text>

  <rect x="560" y="360" width="210" height="120" class="green"/>
  <text x="665" y="399" text-anchor="middle" class="txt">FLAME</text>
  <text x="665" y="426" text-anchor="middle" class="small">target expression mesh</text>
  <text x="665" y="451" text-anchor="middle" class="small">replace exp / jaw only</text>

  <rect x="850" y="145" width="290" height="335" class="yellow"/>
  <text x="995" y="181" text-anchor="middle" class="txt">Differentiable Renderer</text>
  <text x="995" y="209" text-anchor="middle" class="small">rasterization + normal + albedo + lighting</text>
  <rect x="890" y="250" width="105" height="80" class="blue"/>
  <text x="942" y="284" text-anchor="middle" class="small">D_R</text>
  <text x="942" y="306" text-anchor="middle" class="small">reference</text>
  <rect x="1030" y="250" width="105" height="80" class="pink"/>
  <text x="1082" y="284" text-anchor="middle" class="small">D_T</text>
  <text x="1082" y="306" text-anchor="middle" class="small">target</text>
  <rect x="925" y="375" width="175" height="48" class="box"/>
  <text x="1012" y="406" text-anchor="middle" class="small">9-channel control maps</text>

  <rect x="590" y="570" width="320" height="80" class="train"/>
  <text x="750" y="618" text-anchor="middle" class="txt">Control Mixer Module</text>
  <text x="750" y="642" text-anchor="middle" class="small">learnable CMM control tokens</text>

  <rect x="1010" y="555" width="330" height="125" class="green"/>
  <text x="1175" y="592" text-anchor="middle" class="txt">FLUX.2-klein Transformer</text>
  <text x="1175" y="622" text-anchor="middle" class="small">official FLUX.2 text encoder + VAE</text>
  <text x="1175" y="648" text-anchor="middle" class="small">flow matching with injected control tokens</text>

  <rect x="1230" y="150" width="210" height="145" class="orange"/>
  <text x="1335" y="186" text-anchor="middle" class="txt">Edited Image</text>
  <text x="1335" y="211" text-anchor="middle" class="txt">X_hat</text>
  <rect x="1298" y="230" width="74" height="45" fill="#f9cb9c" stroke="#c55a11"/>
  <path d="M1310 258 C1322 275 1350 275 1362 258" fill="none" stroke="#cc0000" stroke-width="5"/>

  <path d="M195 215 L270 215" class="line"/>
  <path d="M195 402 L270 430" class="line"/>
  <path d="M480 225 L560 205" class="line"/>
  <path d="M480 465 L560 425" class="dline"/>
  <path d="M770 205 L850 250" class="line"/>
  <path d="M770 425 L850 330" class="dline"/>
  <path d="M1012 423 L760 570" class="line"/>
  <path d="M910 610 L1010 615" class="line"/>
  <path d="M1340 555 L1340 295" class="line"/>

  <text x="720" y="705" text-anchor="middle" class="small">Stage 1 trains the Conditional DECA Encoder. Stage 2 trains the Control Mixer on top of FLUX.2-klein.</text>
  <text x="720" y="732" text-anchor="middle" class="small">Inference uses the same renderer and CMM, plus Reference Control Guidance (RCG).</text>
</svg>
